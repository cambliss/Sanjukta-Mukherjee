<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Visual Diary — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  :root{
    --ink:#171a3d;
    --indigo:#2f2a8f;
    --indigo-soft:#5b53c9;
    --lilac:#8f7ee8;
    --card-bg:#ffffff;
    --muted:#6a6f9c;
    --ring:#e7e5fb;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Plus Jakarta Sans', sans-serif;
    background:
      radial-gradient(circle at 12% 15%, rgba(255,190,220,.55), transparent 42%),
      radial-gradient(circle at 82% 10%, rgba(190,170,255,.55), transparent 45%),
      radial-gradient(circle at 20% 85%, rgba(255,210,190,.45), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(150,140,255,.55), transparent 45%),
      linear-gradient(160deg,#4a3fb0 0%, #3a2f9e 40%, #4432a8 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
    overflow-x:hidden;
  }

  .panel{
    width:100%;
    max-width:1280px;
    background:var(--card-bg);
    border-radius:28px;
    box-shadow:0 40px 90px -20px rgba(20,10,60,.55), 0 0 0 1px rgba(255,255,255,.4) inset;
    padding:56px 40px 64px;
    position:relative;
  }

  /* header */
  .eyebrow{
    text-align:center;
    letter-spacing:.22em;
    font-size:12px;
    font-weight:700;
    color:var(--indigo-soft);
    margin:0 0 10px;
  }
  h1{
    font-family:'Fraunces', serif;
    text-align:center;
    font-size:46px;
    font-weight:600;
    color:var(--ink);
    margin:0 0 14px;
    letter-spacing:-.01em;
  }
  .sub{
    text-align:center;
    color:var(--muted);
    font-size:15.5px;
    line-height:1.55;
    max-width:420px;
    margin:0 auto 34px;
  }

  /* pills */
  .pills{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:56px;
  }
  .pill{
    border:1.5px solid var(--ring);
    background:#fff;
    color:var(--ink);
    font-size:14px;
    font-weight:600;
    padding:10px 20px;
    border-radius:999px;
    cursor:pointer;
    transition:.2s ease;
    font-family:inherit;
  }
  .pill:hover{ border-color:var(--lilac); }
  .pill.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .pill.more{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border-color:var(--ink);
    font-weight:700;
  }

  /* coverflow */
  .stage{
    position:relative;
    height:460px;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:1400px;
  }
  .track{
    position:relative;
    width:100%;
    height:100%;
  }
  .card{
    position:absolute;
    top:50%;
    left:50%;
    width:220px;
    height:400px;
    border-radius:20px;
    overflow:hidden;
    background:#222 center/cover no-repeat;
    box-shadow:0 25px 50px -12px rgba(20,10,60,.35);
    transition:transform .55s cubic-bezier(.22,.9,.32,1), opacity .55s ease, filter .55s ease, box-shadow .55s ease;
    cursor:pointer;
  }
  .card .tag{
    position:absolute;
    bottom:14px; left:14px;
    color:#fff;
    font-size:12px;
    font-weight:600;
    background:rgba(15,12,40,.45);
    backdrop-filter:blur(6px);
    padding:5px 10px;
    border-radius:999px;
    opacity:0;
    transition:opacity .3s ease;
  }
  .card.center .tag{ opacity:1; }
  .play{
    position:absolute;
    bottom:16px; right:16px;
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(255,255,255,.85);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  .play svg{ width:13px; height:13px; margin-left:2px; }

  /* nav arrows */
  .nav{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:36px;
  }
  .nav button{
    width:44px;height:44px;
    border-radius:50%;
    border:1.5px solid var(--ring);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:.2s ease;
    color:var(--ink);
  }
  .nav button:hover{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }
  .nav button svg{ width:17px; height:17px; }

  @media (max-width: 720px){
    h1{ font-size:32px; }
    .stage{ height:340px; }
    .card{ width:160px; height:290px; }
    .panel{ padding:40px 18px 48px; }
  }
</style>
</head>
<body>

<div class="panel">
  <p class="eyebrow">GALLERY</p>
  <h1>My Visual Diary</h1>
  <p class="sub">See the world through my lens: adventures in photos and videos</p>

  <div class="pills" id="pills">
    <!-- injected -->
  </div>

  <div class="stage">
    <div class="track" id="track"></div>
  </div>

  <div class="nav">
    <button id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<script>
  const destinations = ["Italy","Dubai","London","Berlin","Rome","Lisbon","India","China","Japan"];
  const pillsEl = document.getElementById('pills');
  destinations.forEach((d,i)=>{
    const b = document.createElement('button');
    b.className = 'pill' + (i===0 ? ' active' : '');
    b.textContent = d;
    b.addEventListener('click', ()=>{
      document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
      b.classList.add('active');
    });
    pillsEl.appendChild(b);
  });
  const more = document.createElement('button');
  more.className = 'pill more';
  more.innerHTML = 'View More <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  pillsEl.appendChild(more);

  const photos = [
    { img:'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?q=80&w=800&auto=format&fit=crop', tag:'Dolomites Peaks', video:false },
    { img:'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800&auto=format&fit=crop', tag:'Above the Clouds', video:true },
    { img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=800&auto=format&fit=crop', tag:'Lago di Braies', video:false },
    { img:'https://images.unsplash.com/photo-1495707902641-75cac588d2e9?q=80&w=800&auto=format&fit=crop', tag:'Travel Kit', video:true },
    { img:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=800&auto=format&fit=crop', tag:'Moraine Lake', video:false },
    { img:'https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=800&auto=format&fit=crop', tag:'Alpine Sunrise', video:false },
    { img:'https://images.unsplash.com/photo-1502786129293-79981df4e689?q=80&w=800&auto=format&fit=crop', tag:'Mountain Trail', video:false },
  ];

  const track = document.getElementById('track');
  let current = 2;

  const cardEls = photos.map((p)=>{
    const c = document.createElement('div');
    c.className = 'card';
    c.style.backgroundImage = `url(${p.img})`;
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = p.tag;
    c.appendChild(tag);
    if(p.video){
      const play = document.createElement('div');
      play.className = 'play';
      play.innerHTML = '<svg viewBox="0 0 24 24" fill="#171a3d"><path d="M8 5v14l11-7z"/></svg>';
      c.appendChild(play);
    }
    track.appendChild(c);
    return c;
  });

  function layout(){
    const n = cardEls.length;
    cardEls.forEach((c, i)=>{
      let offset = i - current;
      if (offset > n/2) offset -= n;
      if (offset < -n/2) offset += n;

      const abs = Math.abs(offset);
      const spacing = 195;
      const x = offset * spacing;
      const scale = abs === 0 ? 1 : abs === 1 ? 0.82 : 0.68;
      const rotY = offset * -8;
      const z = -abs * 140;
      const opacity = abs > 2 ? 0 : abs === 2 ? 0.55 : 1;
      const blur = abs === 0 ? 0 : abs * 1;

      c.style.transform = `translate(-50%,-50%) translateX(${x}px) translateZ(${z}px) rotateY(${rotY}deg) scale(${scale})`;
      c.style.opacity = opacity;
      c.style.filter = `blur(${blur}px)`;
      c.style.zIndex = 100 - abs;
      c.classList.toggle('center', abs === 0);
    });
  }

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    current = (current + 1) % cardEls.length;
    layout();
  });
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    current = (current - 1 + cardEls.length) % cardEls.length;
    layout();
  });

  cardEls.forEach((c,i)=>{
    c.addEventListener('click', ()=>{ current = i; layout(); });
  });

  layout();
</script>
</body>
</html>
